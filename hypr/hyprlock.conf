#
# ~/.config/hypr/hyprlock.conf
#

general {
    disable_loading_bar = false
    grace = 2
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.2
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(bac2deff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# Avatar-style circle above the input field
image {
    monitor =
    path = ~/.face
    size = 120
    border_size = 3
    border_color = rgba(cba6f7ff)
    rounding = -1
    position = 0, 30
    halign = center
    valign = center
}

# Password input field, animated border on focus
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(cba6f7ff)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    rounding = 20
    shadow_passes = 2
}
