# ~/.config/kitty/kitty.conf

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        12.0

background_opacity 0.85
dynamic_background_opacity yes
window_padding_width 10

# rounded look comes from Hyprland's decoration.rounding — kitty itself has
# square corners, so leave this file focused on color + transparency.

confirm_os_window_close 0
enable_audio_bell no

# ---- Catppuccin Mocha ----
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

color0  #45475a
color8  #585b70
color1  #f38ba8
